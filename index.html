<!--
ionicinit.min.js 的功能與說明：
push(name, title)：切換到目標頁，並回傳 Promise；約 100ms 後才 resolve，所以你可安全接 .then(...) 做「切頁後渲染」。
presentAlert(header=null, message=null, buttons=null)：快速顯示 Ionic Alert；流程是建立元件 → 設定內容/按鈕 → 顯示 → 移除，避免殘留 DOM。
presentActionSheet(header=null, subHeader=null, buttons=null)：給使用者一組操作選單（例如編輯/刪除/取消）；同樣會在關閉後清理元件。
presentToast(message=null, duration=1800, position='bottom', color=null)：短暫提示訊息（成功、錯誤、已儲存等），支援時間、位置、顏色與按鈕。
window.load 初始化段：動態載入 Ionic CDN 資源、建立 ion-app/ion-router/ion-nav、自動把所有 page-* 註冊成 route，最後呼叫 setUpIonic 完成啟動。

ionicinit.min.js 的使用方式：
1. 在 HTML 中使用 page-* 標籤定義頁面結構。
2. 在 JavaScript 中使用 push('page-xxx') 切換頁面。
3. 使用 presentAlert(...)、presentActionSheet(...)、presentToast(...) 顯示提示框。
-->
<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="viewport=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta name="HandheldFriendly" content="true" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="港幣記賬" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <title>港幣記賬</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="shortcut icon apple-touch-icon" href="appicon.png" />
    <script src="ionicinit.min.js"></script>
    <style>
      :root {
        --ion-color-primary: #3880ff;
      }
      .intro {
        color: var(--ion-color-medium);
        margin-bottom: 24px;
        line-height: 1.5;
      }
      .stat-card {
        background: var(--ion-color-light);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 12px;
        text-align: center;
      }
      .stat-label {
        font-size: 14px;
        color: var(--ion-color-medium);
        margin-bottom: 4px;
      }
      .stat-value {
        font-size: 28px;
        font-weight: 700;
        color: var(--ion-color-primary);
      }
      .expense-preview {
        text-align: center;
        padding: 24px 0;
        margin-bottom: 16px;
      }
      .expense-preview .amount {
        font-size: 36px;
        font-weight: 700;
        color: var(--ion-color-danger);
      }
      .expense-preview .label {
        font-size: 14px;
        color: var(--ion-color-medium);
        margin-top: 4px;
      }
      .empty-state {
        text-align: center;
        padding: 48px 16px;
        color: var(--ion-color-medium);
      }
      .empty-state ion-icon {
        font-size: 64px;
        margin-bottom: 16px;
      }
      .record-amount {
        font-size: 20px;
        font-weight: 700;
        color: var(--ion-color-danger);
      }
      .record-date {
        font-size: 13px;
        color: var(--ion-color-medium);
      }
      .nav-buttons ion-button {
        margin-top: 8px;
      }
    </style>
  </head>

  <body>

    <page-home>
      <ion-header>
        <ion-toolbar color="primary">
          <ion-title>港幣記賬</ion-title>
        </ion-toolbar>
      </ion-header>
      <ion-content class="ion-padding">
        <h2>歡迎使用港幣記賬</h2>
        <p class="intro">輕鬆記錄日常支出，以港幣（HK$）結算，隨時查看消費紀錄。</p>

        <div class="stat-card">
          <div class="stat-label">紀錄總數</div>
          <div class="stat-value" id="home-total-count">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">最新支出金額</div>
          <div class="stat-value" id="home-latest-amount">—</div>
        </div>

        <div class="nav-buttons">
          <ion-button expand="block" shape="round" onclick="goToExpense()">
            <ion-icon slot="start" name="add-circle-outline"></ion-icon>
            記一筆支出
          </ion-button>
          <ion-button expand="block" shape="round" fill="outline" onclick="goToRecords()">
            <ion-icon slot="start" name="list-outline"></ion-icon>
            查看紀錄
          </ion-button>
        </div>
      </ion-content>
    </page-home>

    <page-expense>
      <ion-header>
        <ion-toolbar color="primary">
          <ion-buttons slot="start">
            <ion-back-button defaultHref="/"></ion-back-button>
          </ion-buttons>
          <ion-title>記賬</ion-title>
        </ion-toolbar>
      </ion-header>
      <ion-content class="ion-padding">
        <div class="expense-preview">
          <div class="amount" id="expense-preview-amount">HK$0.00</div>
          <div class="label">支出金額</div>
        </div>

        <ion-item>
          <ion-label position="stacked">支出項目</ion-label>
          <ion-input id="expense-title" placeholder="例如：午餐、交通" clear-input></ion-input>
        </ion-item>
        <ion-item>
          <ion-label position="stacked">金額（HK$）</ion-label>
          <ion-input id="expense-amount" type="number" inputmode="decimal" placeholder="0.00" min="0" step="0.01"></ion-input>
        </ion-item>
        <ion-item>
          <ion-label position="stacked">日期</ion-label>
          <ion-input id="expense-date" type="date"></ion-input>
        </ion-item>

        <ion-button expand="block" shape="round" class="ion-margin-top" onclick="saveExpense(event)">
          <ion-icon slot="start" name="save-outline"></ion-icon>
          儲存支出
        </ion-button>
      </ion-content>
    </page-expense>

    <page-records>
      <ion-header>
        <ion-toolbar color="primary">
          <ion-buttons slot="start">
            <ion-back-button defaultHref="/"></ion-back-button>
          </ion-buttons>
          <ion-title>支出紀錄</ion-title>
          <ion-buttons slot="end">
            <ion-button id="btn-clear-all" onclick="confirmClearAll()" style="display:none;">
              <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
            </ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>
      <ion-content class="ion-padding">
        <div id="records-empty" class="empty-state" style="display:none;">
          <ion-icon name="receipt-outline"></ion-icon>
          <h3>尚無紀錄</h3>
          <p>前往記賬頁新增第一筆支出吧！</p>
        </div>
        <div id="records-list"></div>
      </ion-content>
    </page-records>

    <script>
      const STORAGE_KEY = 'hk-expense-records';

      function getRecords() {
        try {
          return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        } catch {
          return [];
        }
      }

      function saveRecords(records) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
      }

      function formatHKD(amount) {
        return 'HK$' + Number(amount).toFixed(2);
      }

      function getActivePage(tagName) {
        const nav = document.querySelector('ion-nav');
        const pages = nav ? nav.querySelectorAll(tagName) : [];
        return pages.length ? pages[pages.length - 1] : document.querySelector(tagName);
      }

      function getIonInputValue(el) {
        if (!el) return '';
        const native = el.shadowRoot?.querySelector('input, textarea');
        if (native) return (native.value || '').trim();
        return String(el.value ?? '').trim();
      }

      function setIonInputValue(el, val) {
        if (el) el.value = val;
      }

      function getLatestRecord(records) {
        if (!records.length) return null;
        return [...records].sort((a, b) => {
          if (a.date !== b.date) return b.date.localeCompare(a.date);
          return b.id - a.id;
        })[0];
      }

      function updateHomeStats() {
        const page = getActivePage('page-home');
        if (!page) return;
        const records = getRecords();
        const latest = getLatestRecord(records);
        page.querySelector('#home-total-count').textContent = records.length;
        page.querySelector('#home-latest-amount').textContent =
          latest ? formatHKD(latest.amount) : '—';
      }

      function goToExpense() {
        push('page-expense').then(() => {
          resetExpenseForm();
        });
      }

      function goToRecords() {
        push('page-records').then(() => {
          renderRecords();
        });
      }

      function resetExpenseForm() {
        const page = getActivePage('page-expense');
        if (!page) return;

        setIonInputValue(page.querySelector('#expense-title'), '');
        setIonInputValue(page.querySelector('#expense-amount'), '');
        setIonInputValue(page.querySelector('#expense-date'), new Date().toISOString().slice(0, 10));
        page.querySelector('#expense-preview-amount').textContent = 'HK$0.00';

        const amountInput = page.querySelector('#expense-amount');
        amountInput.removeEventListener('ionInput', updateExpensePreview);
        amountInput.addEventListener('ionInput', updateExpensePreview);
      }

      function updateExpensePreview(e) {
        const page = e?.target?.closest('page-expense') || getActivePage('page-expense');
        const val = parseFloat(getIonInputValue(page?.querySelector('#expense-amount')));
        page.querySelector('#expense-preview-amount').textContent =
          isNaN(val) || val < 0 ? 'HK$0.00' : formatHKD(val);
      }

      function saveExpense(event) {
        const page = event.target.closest('page-expense') || getActivePage('page-expense');
        const title = getIonInputValue(page.querySelector('#expense-title'));
        const amountVal = getIonInputValue(page.querySelector('#expense-amount'));
        const date = getIonInputValue(page.querySelector('#expense-date'));

        if (!title) {
          presentAlert('輸入錯誤', '請輸入支出項目');
          return;
        }
        const amount = parseFloat(amountVal);
        if (!amountVal || isNaN(amount) || amount <= 0) {
          presentAlert('輸入錯誤', '請輸入有效的金額（大於 0）');
          return;
        }
        if (!date) {
          presentAlert('輸入錯誤', '請選擇日期');
          return;
        }

        const records = getRecords();
        records.push({ id: Date.now(), title, amount, date });
        saveRecords(records);

        presentToast('支出已儲存', 1800, 'bottom', 'success');
        push('page-home').then(() => {
          updateHomeStats();
        });
      }

      function renderRecords() {
        const page = getActivePage('page-records');
        const records = getRecords().sort((a, b) => {
          if (a.date !== b.date) return b.date.localeCompare(a.date);
          return b.id - a.id;
        });

        const listEl = page.querySelector('#records-list');
        const emptyEl = page.querySelector('#records-empty');
        const clearBtn = page.querySelector('#btn-clear-all');

        if (!records.length) {
          listEl.innerHTML = '';
          emptyEl.style.display = 'block';
          clearBtn.style.display = 'none';
          return;
        }

        emptyEl.style.display = 'none';
        clearBtn.style.display = 'block';
        listEl.innerHTML = records.map(r => `
          <ion-card>
            <ion-card-header>
              <ion-card-title>${escapeHtml(r.title)}</ion-card-title>
              <ion-card-subtitle class="record-date">${r.date}</ion-card-subtitle>
            </ion-card-header>
            <ion-card-content>
              <span class="record-amount">${formatHKD(r.amount)}</span>
            </ion-card-content>
          </ion-card>
        `).join('');
      }

      function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      function confirmClearAll() {
        presentAlert('清除全部紀錄', '確定要刪除所有支出紀錄嗎？此操作無法復原。', [
          { text: '取消', role: 'cancel' },
          { text: '清除', role: 'destructive', handler: clearAllRecords }
        ]);
      }

      function clearAllRecords() {
        saveRecords([]);
        renderRecords();
        presentToast('已清除全部紀錄', 1800, 'bottom', 'warning');
      }

      window.addEventListener('load', () => {
        setTimeout(updateHomeStats, 200);
      });
    </script>

  </body>
</html>
